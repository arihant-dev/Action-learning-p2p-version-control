name: Integration Tests
on:
  push:
    branches: [industry-shipping, master, ws/**]
  pull_request:
    branches: [industry-shipping]

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    strategy:
      matrix:
        # The harness communicates over Unix domain sockets, which Windows
        # does not support the same way.
        # TODO windows E2E needs TCP IPC
        os: [ubuntu-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Build Go coordinator
        run: |
          cd src/backend/go
          go build -o ../../../build/go_coordinator .

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libssl-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install openssl
          echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl)" >> "$GITHUB_ENV"

      - name: Build C++ daemon
        run: |
          cd src/backend/cpp
          cmake -B build -DBUILD_TESTS=ON
          cmake --build build

      - name: Build Java frontend
        run: ./mvnw compile --no-transfer-progress

      - name: Run E2E integration tests
        env:
          # GitHub-hosted macOS runners block multicast/mDNS between loopback
          # processes, so the dedicated mDNS auto-discovery test cannot connect
          # there. Mark mDNS optional on macOS (the harness then records that
          # single test as SKIPPED, not FAILED); Linux keeps it strict.
          P2P_E2E_MDNS_OPTIONAL: ${{ matrix.os == 'macos-latest' && '1' || '' }}
        run: |
          python3 scripts/integration_harness.py

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-logs-${{ matrix.os }}
          path: |
            /tmp/p2p_test*.log
            /tmp/p2p_test_*.log
          if-no-files-found: ignore
