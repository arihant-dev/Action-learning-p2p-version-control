name: Integration Tests
on:
  push:
    branches: [industry-shipping, master, ws/**]
  pull_request:
    branches: [industry-shipping]

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Build Go coordinator
        shell: bash
        run: |
          cd src/backend/go
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            go build -o ../../../build/go_coordinator.exe .
          else
            go build -o ../../../build/go_coordinator .
          fi

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libssl-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install openssl
          echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl)" >> "$GITHUB_ENV"

      - name: Build C++ daemon
        if: runner.os != 'Windows'
        run: |
          cd src/backend/cpp
          cmake -B build -DBUILD_TESTS=ON
          cmake --build build

      - name: Build C++ daemon (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -S src/backend/cpp -B src/backend/cpp/build
          cmake --build src/backend/cpp/build --config Release
          $candidates = @(
            "src/backend/cpp/build/Release/p2p_daemon.exe",
            "src/backend/cpp/build/bin/Release/p2p_daemon.exe",
            "src/backend/cpp/build/bin/p2p_daemon.exe"
          )
          $found = $false
          foreach ($c in $candidates) {
            if (Test-Path $c) {
              Copy-Item $c build/p2p_daemon.exe
              $found = $true
              Write-Host "Copied daemon from: $c"
              break
            }
          }
          if (-not $found) {
            throw "Cannot find p2p_daemon.exe build output"
          }

      - name: Build Java frontend
        shell: bash
        run: ./mvnw compile --no-transfer-progress

      - name: Run E2E integration tests
        shell: bash
        env:
          # GitHub-hosted macOS runners block multicast/mDNS between loopback
          # processes, so the dedicated mDNS auto-discovery test cannot connect
          # there. Mark mDNS optional on macOS (the harness then records that
          # single test as SKIPPED, not FAILED); Linux keeps it strict.
          P2P_E2E_MDNS_OPTIONAL: ${{ matrix.os == 'macos-latest' && '1' || '' }}
        run: |
          if command -v python3 &> /dev/null; then
            python3 scripts/integration_harness.py
          else
            python scripts/integration_harness.py
          fi

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-logs-${{ matrix.os }}
          path: |
            /tmp/p2p_test*.log
            /tmp/p2p_test_*.log
          if-no-files-found: ignore
