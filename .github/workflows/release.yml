name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-15-intel, macos-latest]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build macOS App Bundle
        run: |
          chmod +x mvnw
          VERSION="${GITHUB_REF_NAME#v}" ./build_macos.sh

      - name: Determine Architecture Name
        id: arch
        run: |
          ARCH=$(uname -m)
          if [ "$ARCH" = "x86_64" ]; then
            ARCH="x64"
          fi
          echo "arch=$ARCH" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: P2PVersionControl-macos-${{ steps.arch.outputs.arch }}
          path: target/P2PVersionControl-*.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ binutils fakeroot

      - name: Build Linux App Image
        run: |
          chmod +x mvnw
          VERSION="${GITHUB_REF_NAME#v}" ./build_linux.sh

      - uses: actions/upload-artifact@v4
        with:
          name: P2PVersionControl-linux
          path: target/P2PVersionControl-*.tar.gz

  create-release:
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        run: |
          VERSION="$GITHUB_REF_NAME"
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes \
            *.zip \
            *.tar.gz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
