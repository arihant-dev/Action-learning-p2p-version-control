name: Build-Testing

on:
  push:
    branches:
      - master
      - test/**
      - fix/**
      - feature/**
      - audit/**
  pull_request:
    branches:
      - master

jobs:
  go-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: src/backend/go

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - run: go build ./...

      - run: go clean -testcache && go test ./... -count=1 -a

  cpp-build-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: cmake-build
        working-directory: src/backend/cpp
        run: |
          mkdir -p build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          cmake --build . --parallel

      - name: run-cmake-tests
        working-directory: src/backend/cpp
        run: ctest --test-dir build --output-on-failure

  java-build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: setup-java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - run: ./mvnw compile --no-transfer-progress
