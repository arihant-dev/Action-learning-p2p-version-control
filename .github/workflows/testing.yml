name: Build-Testing

on:
  push:
    branches:
      - master

jobs:
  cmake-testing:
    runs-on: ubuntu-latest

    steps:
      - name: checkout-source
        uses: actions/checkout@v4

      - name: cmake-configure
        working-directory: src/backend/cpp
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release

      - name: cmake-build
        working-directory: src/backend/cpp
        run: |
          cmake --build build --config Release --parallel

      - name: run-cmake-tests
        working-directory: src/backend/cpp/build
        run: ctest --output-on-failure

  go-testing:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/backend/go

    steps:
      - name: checkout-source
        uses: actions/checkout@v4

      - name: setup-go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/backend/go/go.mod
          cache: true

      - name: build-go
        run: go build ./...

      - name: test-go
        run: go test ./...
